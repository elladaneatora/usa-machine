<!doctype html>
<html lang="en">
<head>

<title>USA Caption Machine</title>
<style>
  :root { --ground:#0e0b09; --panel-edge:#2b1f16; --cream:#ece3d4; --muted:#8f8069; --amber:#e7a95a; --amber-deep:#c8802f; --ember:#d8613a; --focus:#f0c079; }
  * { box-sizing:border-box; }
  html, body { height:100%; }
  body { margin:0; background: radial-gradient(120% 90% at 50% -10%, #241812 0%, rgba(36,24,18,0) 55%), radial-gradient(90% 70% at 50% 120%, #1c130d 0%, rgba(28,19,13,0) 60%), var(--ground); color:var(--cream); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100dvh; padding:clamp(16px,4vw,40px); position:relative; overflow-x:hidden; }
  body::after { content:""; position:fixed; inset:0; pointer-events:none; z-index:50; opacity:0.05; mix-blend-mode:overlay; background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }
  .wrap { width:100%; max-width:480px; display:flex; flex-direction:column; gap:18px; position:relative; z-index:2; }
  header.brand { display:flex; align-items:baseline; justify-content:space-between; gap:12px; padding:0 2px; }
  .brand h1 { margin:0; font-size:clamp(20px,6vw,26px); font-weight:800; letter-spacing:0.14em; text-transform:uppercase; line-height:1; }
  .brand h1 .flag { color:var(--amber); }
  .brand .tag { font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
  .card { position:relative; background:linear-gradient(165deg,#1b130d 0%,#140e09 100%); border:1px solid var(--panel-edge); border-radius:20px; padding:clamp(22px,6vw,34px); min-height:300px; display:flex; flex-direction:column; justify-content:space-between; gap:22px; box-shadow:0 1px 0 rgba(231,169,90,0.06) inset,0 30px 60px -30px rgba(0,0,0,0.9); }
  .quotemark { font-family:Georgia,"Times New Roman",serif; font-size:60px; line-height:0.4; color:var(--amber-deep); opacity:0.5; height:26px; }
  .caption { font-family:Georgia,"Times New Roman",serif; font-size:clamp(17px,4.6vw,20px); line-height:1.62; color:var(--cream); margin:0; }
  .caption .hash { color:var(--amber); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-weight:600; font-size:0.9em; }
  .card.swap .caption { animation:rise 0.5s cubic-bezier(0.2,0.7,0.2,1); }
  @keyframes rise { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .meta { display:flex; align-items:center; justify-content:space-between; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); border-top:1px solid var(--panel-edge); padding-top:16px; }
  .meta .dot { color:var(--ember); }
  .controls { display:grid; grid-template-columns:1fr auto; gap:12px; }
  button { font-family:inherit; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; border-radius:14px; cursor:pointer; border:1px solid transparent; transition:transform 0.12s ease,color 0.18s ease,border-color 0.18s ease; font-size:14px; }
  button:active { transform:translateY(1px) scale(0.995); }
  .btn-gen { padding:17px 20px; color:#1a1006; background:linear-gradient(180deg,var(--amber) 0%,var(--amber-deep) 100%); box-shadow:0 10px 24px -12px rgba(231,169,90,0.8); }
  .btn-gen:hover { filter:brightness(1.06); }
  .btn-copy { padding:17px 20px; color:var(--cream); background:transparent; border-color:var(--panel-edge); display:inline-flex; align-items:center; gap:8px; white-space:nowrap; }
  .btn-copy:hover { border-color:var(--amber-deep); color:var(--amber); }
  .btn-copy.copied { color:#7cc47c; border-color:#2e5a2e; }
  footer.note { text-align:center; font-size:11px; letter-spacing:0.1em; color:var(--muted); padding:2px 8px; line-height:1.5; }
</style>
</head>
<body>
<div class="wrap">
  <header class="brand">
    <h1>USA<span class="flag">·</span>Machine</h1>
    <span class="tag">always a new one</span>
  </header>
  <div class="card" id="card">
    <div class="quotemark">&ldquo;</div>
    <p class="caption" id="caption"></p>
    <div class="meta"><span id="counter">#001</span><span><span class="dot">●</span>&nbsp;made with effect</span></div>
  </div>
  <div class="controls">
    <button class="btn-gen" id="gen">New caption</button>
    <button class="btn-copy" id="copy">Copy</button>
  </div>
  <footer class="note">Free · no account. Share the link with your followers.</footer>
</div>
<script>
const ABSTRACT = [
  "Some of it was real and a lot of it was cover.",
  "It sold a feeling and called it a product.",
  "It gave people something to belong to and something to chase.",
  "It promised more than it could keep and kept just enough.",
  "It made people feel free and gave them one more thing to want.",
  "For a while it worked, and then the moment moved on without it.",
  "It filled a space nobody would admit was empty.",
  "It was convenience to some and a quiet loss to others.",
  "It handed people freedom and a cost to go with it.",
  "It was equal parts ritual and performance.",
  "It taught a whole generation to want before it taught them why.",
  "It looked like progress and settled into a habit.",
  "It brought people together and set them slightly apart.",
  "It was comfort you could reach for and never quite hold.",
  "It offered an escape that always pointed back the way it came.",
  "Some people found something in it and most just passed the time.",
  "It dressed an ordinary thing up as a way of life.",
  "It was generous and calculating in the same breath.",
  "It made the ordinary feel like an event.",
  "It gave the country a shared thing to point at and argue about.",
  "It answered a small need and quietly grew a larger one.",
  "It was freedom for some and a script for everyone else.",
  "It arrived as a novelty and stayed as a norm.",
  "It asked very little and slowly took quite a lot.",
  "It was a promise the country made to itself out loud.",
  "It turned a private want into a public one.",
  "It gave people a story they could afford to tell.",
  "It was real enough to believe and staged enough to doubt.",
  "It ran on a nostalgia it was busy manufacturing.",
  "It offered belonging with conditions nobody read closely.",
  "It was progress for some and routine for the rest.",
  "It let people feel like insiders while it quietly kept score.",
  "It made waiting feel like taking part.",
  "It was built to be missed once it was gone.",
  "It gave a generation a language and never fully explained the cost.",
  "It landed somewhere between a gift and a pitch.",
  "It answered a need it had helped invent.",
  "It kept its promises just often enough to be trusted.",
  "It was the kind of thing people defended without knowing why.",
  "It made comfort look like an achievement."
];
const TOPICS = [
  {o:["The American shopping mall promised a town square with a roof and air conditioning.","America put a town square under one roof, added air conditioning, and called it a mall."],m:["Teenagers treated it as a house their parents didn't run.","It was the one place a kid could exist unsupervised and indoors.","The stores changed but the ritual of walking the same loop never did."],c:["So was the mall the death of Main Street or the last public place the country built for people who had nowhere else to go?","So did the mall give America a community or just a very well-lit place to spend an afternoon?"]},
  {o:["MTV played its first video and then spent a decade deciding what a teenager was supposed to want.","America handed its teenagers a channel that never stopped and let it raise them between commercials."],m:["It sold rebellion in three-minute segments.","It made stars faster than the culture could keep up with.","It turned music into something you watched instead of something you heard."],c:["So did MTV give American kids a culture of their own or just an advertisement shaped like one?","So was MTV a revolution or a very stylish way to sell the same afternoon back to a generation?"]},
  {o:["The American drive-in put a movie screen in a field and called it a night out.","America parked its cars in a field, pointed them at a screen, and called it going to the movies."],m:["Half the cars weren't watching the film and everybody knew it.","It was the only private space a young couple could afford.","The sound came through a tinny speaker you hung on your window."],c:["So was the drive-in about the movie or about the one place the adults couldn't see into?","So did the drive-in sell cinema or just darkness with a picture in front of it?"]},
  {o:["Detroit built a car with more engine than anyone needed and sold it as freedom you could park in the driveway.","America bolted an enormous engine to an ordinary car and called the result freedom."],m:["It burned fuel like the future was never coming.","It gave a working man something powerful that was finally his.","The sound of it was half the reason anyone bought one."],c:["So was the muscle car American ambition or just noise with a warranty?","So did the muscle car sell freedom or the feeling of it at four miles per gallon?"]},
  {o:["Las Vegas built a city in the desert on the math that the house always wins.","America raised a city out of the desert and ran it entirely on the odds staying with the house."],m:["The lights were designed so you'd lose track of time and money at the same speed.","A few people left with a story and most left lighter.","There were no clocks and no windows for a reason."],c:["So was Vegas the American dream sped up or the American dream with the odds finally printed on the wall?","So did Vegas sell a shot at everything or a very bright room to lose it in?"]},
  {o:["American cereal put a cartoon animal on the box and aimed it at children at eye level in the aisle.","America drew a cartoon animal, printed it on a box of sugar, and set it where a child would look."],m:["The sugar was the product and the mascot was the salesman.","It sold breakfast as a toy you were allowed to eat.","The prize at the bottom mattered more than anything above it."],c:["So did the cereal mascot make mornings fun or just teach a kid to want the box before he wanted the food?","So was the cereal mascot harmless fun or the first salesman a child ever trusted?"]},
  {o:["The American infomercial ran at 3am and sold a gadget no store would stock to an audience that couldn't sleep.","America filled the middle of the night with a half-hour ad pretending to be a show."],m:["It promised your life was one purchase away from fixed.","Some of the gadgets worked and most ended up in a drawer.","There was always a second one free if you called right now."],c:["So was the infomercial solving a problem or manufacturing the ache it claimed to cure?","So did the infomercial sell a product or the fantasy that a product was ever the issue?"]},
  {o:["The American roller rink put a disco ball over a wooden floor and let kids move in a circle for hours.","America hung a disco ball over a wooden floor and let a town's kids go around in circles."],m:["It was a social life on eight wheels.","It was one of the last places a town gathered without a screen.","The whole night ran on one song after another and nowhere else to be."],c:["So was the roller rink just a fad or the last analog dance floor America built for its kids?","So did the rink sell an evening or the last version of a childhood spent in public?"]},
  {o:["The video store made every American a curator of one weekend at a time.","America lined a room with movie boxes and let you decide who you'd be by Friday night."],m:["The late fee was the tax on forgetting.","Choosing the movie was half the evening.","The empty box on the shelf meant someone beat you to it."],c:["So did the video store sell movies or the small serious pleasure of choosing one with your own hands?","So was the video store a shop or a weekly ritual America didn't know it would miss?"]},
  {o:["American kids bought baseball cards for the gum and kept them for reasons nobody explained.","America sold children a stick of gum and a piece of cardboard and let the cardboard become the point."],m:["A piece of cardboard became worth more than the player some years.","It taught a child markets, loss, and hope in a shoebox.","The one you wanted was always in the pack you didn't buy."],c:["So were baseball cards a hobby or a first lesson in betting on someone else's career?","So did the cards sell a game or teach a kid to price the things he loved?"]},
  {o:["The American diner stayed open all night and served the same coffee to the trucker, the cop, and the kid with nowhere to go.","America kept one light on all night and called it a diner."],m:["It wasn't good food so much as reliable food.","It was the closest thing a highway had to a living room.","The waitress knew the regulars and half the strangers by the second cup."],c:["So was the diner about the meal or about being the one door in town that never locked?","So did the diner sell food or a place to sit when there was nowhere else at 2am?"]},
  {o:["America built a highway across itself and told its people the answer was somewhere further west.","America laid down endless road and sold the horizon as a solution."],m:["The road trip sold motion as a cure for a feeling.","Some found something out there and most just found the next town.","The tank emptied faster than whatever they were running from."],c:["So was the great American road trip a search or a very scenic way to avoid standing still?","So did the open road offer freedom or just enough distance to feel like it?"]},
  {o:["The American mixtape took ninety minutes and a double deck to say something a kid couldn't say out loud.","America gave a teenager two tape decks and a way to hand someone a feeling without a word."],m:["Every song was a sentence and the order was the whole argument.","It was a gift that cost only time and nerve.","You had to hit record at exactly the right second or start the side over."],c:["So was the mixtape about the music or about handing someone a feeling you'd deny if they asked?","So did the mixtape share songs or smuggle a confession between them?"]},
  {o:["Saturday morning gave American kids a few hours that belonged entirely to them.","America set aside one morning a week for its children and filled every break with something to sell them."],m:["Every commercial sold the toys the show was already about.","It was babysitting, marketing, and mythology at once.","It built a whole generation's sense of humor before school could."],c:["So were Saturday cartoons a gift to children or the first audience America ever sold to itself?","So did the cartoons entertain kids or train them to be watched?"]},
  {o:["America drew streets that all curved the same way and called the result a dream you could mortgage.","America laid out identical streets, planted identical lawns, and sold each one as a dream."],m:["The lawn was proof you'd made it and a chore that never ended.","It gave millions a safe place and a quiet kind of sameness.","Every house had the same two-car promise out front."],c:["So was the suburb the American dream delivered or the American dream with the edges filed off?","So did the suburb offer a better life or a quieter version of the same one, further from town?"]},
  {o:["American fast food promised the same burger in every state and mostly delivered.","America built a kitchen that worked the same in every town and never closed."],m:["It fed a country on the move for the price of pocket change.","It taught a nation to eat standing up and call it convenience.","The menu was the same in a way that felt like home and a warning at once."],c:["So did fast food free the American family from the kitchen or just quietly close it?","So was fast food a convenience or the moment dinner stopped being a place you sat down?"]},
  {o:["American wrestling told you it was fake and then dared you not to feel it anyway.","America put on a show that admitted it was a show and packed the arena anyway."],m:["The hero and the villain were scripted but the crowd's roar was not.","It was theater that refused to admit it was theater.","Everyone in the building was in on it and cheered like they weren't."],c:["So was pro wrestling a con on its audience or the most honest thing on television about what America wanted to believe?","So did wrestling fool the crowd or just let them agree to be fooled together?"]},
  {o:["Cable gave the American living room fifty channels, then a hundred, then the quiet panic of nothing on.","America wired every home to a hundred channels and still left it staring, flipping."],m:["Choice arrived and satisfaction did not come with it.","It connected the country to everything and no one to anything in particular.","There was always something else on and never quite the thing you wanted."],c:["So did cable expand the American mind or just teach it to keep flipping?","So was cable more to watch or just more ways to feel there was nothing on?"]},
  {o:["The American state put a jackpot on a paper ticket and sold hope by the dollar at the gas station counter.","America printed a jackpot on a slip of paper and sold it a dollar at a time."],m:["The odds were printed too small to read, on purpose.","For a few days a family got to plan a life they'd never live.","The line was longest the week the number climbed highest."],c:["So is the lottery a tax on the poor or the cheapest dream America still sells over the counter?","So does the lottery sell a chance or just permission to imagine for a dollar?"]},
  {o:["America invented a window you could order dinner from without turning off the engine.","America cut a window into the side of a restaurant so no one had to get out of the car."],m:["It saved everyone four minutes and cost something harder to name.","The car became the dining room and the wait became the meal.","The voice in the speaker got your order almost right almost every time."],c:["So was the drive-thru genius convenience or the moment the American family stopped getting out of the car?","So did the drive-thru save time or just move dinner into the front seat for good?"]},
  {o:["America discovered its own body in the eighties and sold it back a videotape and a leotard.","America turned working out into a product and mailed it to the living room in bright spandex."],m:["Fitness became a moral position you could rent by mail.","It made people healthier and anxious in a brand-new direction.","The instructor smiled the whole time like the pain was a gift."],c:["So was the fitness craze about getting strong or about giving Americans one more thing to fail at in the living room?","So did the fitness craze sell health or a shinier way to feel behind?"]},
  {o:["Wall Street in the eighties made a religion out of more and put it in a suit.","America dressed greed in a good suit in the eighties and called it ambition."],m:["The men who won got magazine covers and the ones who lost got quiet.","It created enormous wealth and a definition of success narrow enough to strangle a person.","The phones never stopped and neither, it seemed, could the people holding them."],c:["So was eighties Wall Street American ambition perfected or greed that finally found good lighting?","So did Wall Street reward the best or just the ones who wanted it most?"]},
  {o:["The American talk show put ordinary people on a stage and let a studio audience decide how to feel about them.","America gave ordinary people a stage and a studio audience to judge them in real time."],m:["It called that honesty and sold it as entertainment.","Some people found a voice and most found a spectacle with their name under it.","The audience was told when to gasp and mostly meant it."],c:["So was the talk show America listening to itself or just watching itself for ratings?","So did the talk show give people a voice or an audience that came to watch them lose it?"]},
  {o:["The American high school built a stadium bigger than its library and gave a teenage boy a jacket that said he mattered on Friday nights.","America built its small towns a stadium and handed the keys to teenagers for one night a week."],m:["For some it was the peak of a whole life at seventeen.","It was the one thing the whole town showed up for.","The lights on Friday could be seen from the next county."],c:["So was high school football a rite of passage or a small town rehearsing its glory on children?","So did Friday night lift a town up or ask its kids to carry it?"]},
  {o:["The American county fair rolled into town with rides bolted together that morning and prizes no one could win.","America sent a fair from town to town, assembled by noon and gone by Monday."],m:["It smelled like fried everything and ran on nostalgia and diesel.","It was the one weekend the whole county stood in the same field.","The game was rigged and everyone played it anyway."],c:["So was the fair a genuine gathering or a traveling illusion America agreed to believe once a year?","So did the fair bring a county together or just sell it one good weekend?"]},
  {o:["America handed its citizens a rectangle of plastic and called it trust with a limit.","America gave everyone a piece of plastic that turned wanting into having, for now."],m:["It let a family live the life they were still paying for.","It bought the sofa now and the argument later.","The minimum payment was designed to never quite end."],c:["So was the credit card freedom from waiting or a very polite way to sell people their own future at interest?","So did the card offer freedom or just a longer, more expensive way to want things?"]},
  {o:["American television found a preacher, gave him a satellite, and let him ask a nation for money between miracles.","America beamed a preacher into every living room and let him pass the plate through the screen."],m:["Some of the faith was real and some of the accounting was not.","It sold salvation with an 800 number at the bottom of the screen.","The set got bigger every year the donations did."],c:["So was the televangelist a ministry or the first influencer America ever put on the air?","So did the televangelist save souls or just find a wider room to pass the plate?"]},
  {o:["America turned one high school night into a small wedding no one was marrying into.","America taught its teenagers to rehearse adulthood for one expensive night in a rented room."],m:["The dress, the car, the photo on the stairs, all of it rehearsing an adulthood that hadn't arrived.","For one night teenagers played at being the people they hoped to become.","The whole thing was over by midnight and remembered for decades."],c:["So was prom a celebration or America teaching its kids to perform a milestone before they'd earned one?","So did prom mark a beginning or just dress one up for the camera?"]},
  {o:["The American motel put a neon sign by the highway that said VACANCY and meant anyone was welcome for a night.","America lit a neon sign by the highway and asked no questions of whoever pulled in."],m:["It was shelter sold by the evening to people passing through or hiding out.","It held honeymoons and getaways in the same room.","The key was real metal and the ice machine hummed all night."],c:["So was the roadside motel the freedom of the open road or just the loneliest light left on in America?","So did the motel offer a fresh start or only a place to pause on the way to one?"]},
  {o:["America gave its children a man who could fly and dressed the country's anxieties in a cape.","America drew a man who could fly and handed him every fear the country wouldn't name."],m:["Every hero was a wish and every villain was a fear in a costume.","It sold ten cents of hope on a spinner rack.","The city always needed saving and someone always showed up."],c:["So were superheroes American optimism in print or a nation quietly admitting it was waiting to be saved?","So did the superhero sell hope or a country's hope that someone else would handle it?"]},
  {o:["The American boombox put a whole stereo on a kid's shoulder and turned a sidewalk into a broadcast.","America shrank the stereo down to something a teenager could carry loud through a neighborhood."],m:["It was music as territory, carried loud and on purpose.","It gave a neighborhood a sound and gave the adults a headache.","It ran through batteries almost as fast as it ran through the block."],c:["So was the boombox self-expression or a teenager's way of taking up space the country hadn't given him?","So did the boombox share music or claim a corner of the street with it?"]},
  {o:["America put a stranger's advice on a bestseller list and sold millions the same secret to a different life.","America turned a stranger's advice into a bestseller and sold everyone the same way out."],m:["Some of it changed someone and most got read halfway and shelved.","It turned improvement into a product you could finish and still not become.","The next one was always out before you'd tried the last."],c:["So was the self-help book a map or just America selling the ache and the cure in one paperback?","So did the self-help book offer a way forward or just a well-written reason to keep buying them?"]}
];
const captionEl=document.getElementById('caption'),cardEl=document.getElementById('card'),counterEl=document.getElementById('counter'),genBtn=document.getElementById('gen'),copyBtn=document.getElementById('copy');
let current="",count=0;
let seen;
try { seen = new Set(JSON.parse(localStorage.getItem('usa_seen')||'[]')); } catch(e){ seen = new Set(); }
function remember(s){ seen.add(s); try { const a=[...seen]; if(a.length>5000)a.splice(0,a.length-5000); localStorage.setItem('usa_seen',JSON.stringify(a)); } catch(e){} }
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function pickTwo(a){ let i=Math.floor(Math.random()*a.length),j; do{ j=Math.floor(Math.random()*a.length); }while(j===i); return [a[i],a[j]]; }
function compose(){ const t=pick(TOPICS); const [a1,a2]=pickTwo(ABSTRACT); const tag=Math.random()<0.5?'#america':'#usa'; return pick(t.o)+' '+pick(t.m)+' '+a1+' '+a2+' '+pick(t.c)+' '+tag; }
function generate(){ let s,tries=0; do{ s=compose(); tries++; }while(seen.has(s)&&tries<12); remember(s); return s; }
function render(t){ captionEl.innerHTML=t.replace(/(#\w+)/g,'<span class="hash">$1</span>'); }
function next(){ current=generate(); count++; counterEl.textContent='#'+String(count).padStart(3,'0'); render(current); cardEl.classList.remove('swap'); void cardEl.offsetWidth; cardEl.classList.add('swap'); resetCopy(); }
function resetCopy(){ copyBtn.classList.remove('copied'); copyBtn.textContent='Copy'; }
async function copyCurrent(){ try{ await navigator.clipboard.writeText(current); }catch(e){ const ta=document.createElement('textarea'); ta.value=current; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(_){} document.body.removeChild(ta); } copyBtn.classList.add('copied'); copyBtn.textContent='Copied ✓'; setTimeout(resetCopy,1600); }
genBtn.addEventListener('click',next);
copyBtn.addEventListener('click',copyCurrent);
next();
</script>
